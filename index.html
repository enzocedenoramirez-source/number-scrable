<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Soup Word Search Game</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #grid { display: grid; gap: 1px; }
        .cell { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border: 1px solid #ccc; cursor: pointer; user-select: none; }
        .selected { background-color: lightblue; }
    </style>
</head>
<body>
    <h1>Number Soup Word Search Game</h1>
    <div>
        <label for="difficulty">Select Difficulty:</label>
        <select id="difficulty">
            <option value="10">Easy (10x10)</option>
            <option value="12">Medium (12x12)</option>
            <option value="14">Hard (14x14)</option>
        </select>
        <button id="startGame">Start Game</button>
    </div>
    <div id="grid"></div>
    <div id="wordList"></div>
    <script>
        const words = ['APPLE', 'BANANA', 'CHERRY', 'DATE', 'ELDERBERRY', 'FIG', 'GRAPE', 'HONEYDEW', 'KIWI', 'LEMON', 'MANGO', 'NUT', 'ORANGE', 'PEACH', 'QUINCE'];
        let selectedCells = [];

        document.getElementById('startGame').addEventListener('click', () => {
            const size = parseInt(document.getElementById('difficulty').value);
            createGrid(size);
        });

        function createGrid(size) {
            const gridElement = document.getElementById('grid');
            gridElement.innerHTML = '';
            gridElement.style.gridTemplateColumns = `repeat(${size}, 1fr)`;

            const letters = generateGrid(size);

            letters.forEach((row, rowIndex) => {
                row.forEach((letter, colIndex) => {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.textContent = letter;
                    cell.addEventListener('click', () => toggleCellSelection(cell, rowIndex, colIndex));
                    gridElement.appendChild(cell);
                });
            });

            displayWords();
        }

        function generateGrid(size) {
            const grid = Array.from({ length: size }, () => Array(size).fill(''));
            // Fill the grid with random letters and hide words here
            for (let word of words.slice(0, 15)) {
                placeWordInGrid(word, grid);
            }
            return grid;
        }

        }

        function toggleCellSelection(cell, rowIndex, colIndex) {
            if (selectedCells.includes(cell)) {
                selectedCells = selectedCells.filter(c => c !== cell);
                cell.classList.remove('selected');
            } else {
                selectedCells.push(cell);
                cell.classList.add('selected');
            }
        }

        function displayWords() {
            const wordListElement = document.getElementById('wordList');
            wordListElement.innerHTML = ''; // Clear existing list
            words.slice(0, 15).forEach(word => {
                const li = document.createElement('li');
                li.textContent = word;
                wordListElement.appendChild(li);
            });
        }
    </script>
</body>
</html>
